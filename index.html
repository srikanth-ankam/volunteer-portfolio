<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Volunteer Portfolio</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* GLOBAL */
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(120deg, #f5f7fa, #e4ecf7);
}

/* HEADER */
header {
    position: relative;
    text-align: center;
    padding: 70px 20px 50px;
    color: white;
    min-height: 300px;
}

/* CLEAN BACKGROUND IMAGE */
header::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: url('Banner2.jpg') center center / cover no-repeat;
    top: 0;
    left: 0;
    z-index: 0;
}

/* LIGHT OVERLAY (FIXED – NO DARK SHADE) */
header::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
    background: rgba(0,0,0,0.2); /* lighter */
    z-index: 0;
}

/* CONTENT ABOVE */
header * {
    position: relative;
    z-index: 1;
}

/* GRADIENT NAME */
.name-style {
    font-size: 30px;
    font-weight: bold;
    background: linear-gradient(90deg, #ff4d4d, #ff0000, #b30000);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* PROFILE */
.profile-img {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 4px solid white;
    object-fit: cover;
    margin-top: 10px;
}

@media(min-width:768px){
    .profile-img {
        width: 150px;
        height: 150px;
    }
}

/* CONTAINER */
.container {
    max-width: 1100px;
    margin: auto;
    padding: 15px;
}

/* CARD */
.card {
    background: rgba(255,255,255,0.95);
    border-radius: 16px;
    padding: 20px;
    margin: 20px 0;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}

/* STATS */
.stats {
    display: grid;
    grid-template-columns: repeat(2,1fr);
    gap: 12px;
    text-align: center;
}

@media(min-width:768px){
    .stats {
        grid-template-columns: repeat(3,1fr);
    }
}

.stat-box {
    background: white;
    border-radius: 12px;
    padding: 15px;
}

.stat-box h3 {
    color: #ff4d4d;
}

/* BUTTON */
button {
    background: linear-gradient(135deg, #b30000, #ff4d4d);
    color: white;
    padding: 12px 20px;
    border: none;
    border-radius: 30px;
    cursor: pointer;
}

/* MODAL */
.modal {
    display: none;
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    top: 0;
    left: 0;
    z-index: 999;
}

.viewer {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
}

.viewer img {
    max-width: 95%;
    max-height: 95%;
    object-fit: contain;
}

/* NAV BUTTONS */
.nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    font-size: 35px;
    color: white;
    background: rgba(255,255,255,0.2);
    border: none;
    padding: 12px;
    border-radius: 50%;
    cursor: pointer;
}

.prev { left: 15px; }
.next { right: 15px; }

/* CLOSE */
.close {
    position: absolute;
    right: 20px;
    top: 10px;
    font-size: 30px;
    color: white;
    cursor: pointer;
}

/* INDICATOR */
.indicator {
    position: absolute;
    bottom: 20px;
    width: 100%;
    text-align: center;
    color: white;
}

</style>
</head>

<body>

<header>
    <h2 id="name" class="name-style">Volunteer</h2>
    <p>Active Blood Donation Volunteer</p>
    <img id="photo" class="profile-img">
    <p><b>Inspiring donors • Saving lives • Building community</b></p>
</header>

<div class="container">

<div class="card">
    <h3>Impact Overview</h3>
    <div class="stats">
        <div class="stat-box"><h3 id="donations">0</h3><p>Donations</p></div>
        <div class="stat-box"><h3 id="lives">0</h3><p>Lives Saved</p></div>
        <div class="stat-box"><h3 id="emergency">0</h3><p>Emergency Cases</p></div>
        <div class="stat-box"><h3 id="motivated">0</h3><p>Motivated</p></div>
        <div class="stat-box"><h3 id="hospitals">0</h3><p>Hospitals</p></div>
        <div class="stat-box"><h3 id="camps">0</h3><p>Camps</p></div>
    </div>
</div>

<div class="card">
    <canvas id="impactChart"></canvas>
</div>

<div class="card" style="text-align:center;">
    <button onclick="openCertificate()">View Certificates</button>
</div>

</div>

<!-- MODAL -->
<div id="modal" class="modal">
    <span class="close" onclick="closeCertificate()">×</span>
    <button class="nav prev" onclick="prevSlide()">❮</button>
    <button class="nav next" onclick="nextSlide()">❯</button>

    <div class="viewer">
        <img id="certImage">
    </div>

    <div id="indicator" class="indicator"></div>
</div>

<script>

const volunteers = {
    1: {
        name: "Gariga Lokesh",
        donations: 1,
        lives: 1,
        emergency: 1,
        motivated: 5,
        hospitals: 0,
        camps: 0,
        photo: "Gariga_Lokesh_Photo.jpeg",
        certificates: [
            "Gariga Lokesh_Appreciation.jpg",
            "Gariga_Lokesh_Active _Donor_Appreciation.png"
        ]
    }
};

let currentCertificates = [];
let currentIndex = 0;

function getIdFromURL() {
    return new URLSearchParams(window.location.search).get("id");
}

function loadVolunteer() {
    const v = volunteers[getIdFromURL()];
    if (!v) return;

    document.getElementById("name").innerText = v.name;
    document.getElementById("photo").src = v.photo;

    document.getElementById("donations").innerText = v.donations;
    document.getElementById("lives").innerText = v.lives;
    document.getElementById("emergency").innerText = v.emergency;
    document.getElementById("motivated").innerText = v.motivated;
    document.getElementById("hospitals").innerText = v.hospitals;
    document.getElementById("camps").innerText = v.camps;

    currentCertificates = v.certificates;

    new Chart(document.getElementById("impactChart"), {
        type: "bar",
        data: {
            labels: ["Donations","Lives","Emergency","Motivated","Hospitals","Camps"],
            datasets: [{
                data: [
                    v.donations,
                    v.lives,
                    v.emergency,
                    v.motivated,
                    v.hospitals,
                    v.camps
                ]
            }]
        },
        options: {
            plugins: { legend: { display:false } }
        }
    });
}

/* SLIDER */
function showSlide() {
    document.getElementById("certImage").src = currentCertificates[currentIndex];
    document.getElementById("indicator").innerText =
        (currentIndex + 1) + " / " + currentCertificates.length;
}

function openCertificate() {
    if (!currentCertificates.length) return;
    currentIndex = 0;
    showSlide();
    document.getElementById("modal").style.display = "block";
}

function nextSlide() {
    currentIndex = (currentIndex + 1) % currentCertificates.length;
    showSlide();
}

function prevSlide() {
    currentIndex = (currentIndex - 1 + currentCertificates.length) % currentCertificates.length;
    showSlide();
}

function closeCertificate() {
    document.getElementById("modal").style.display = "none";
}

/* SWIPE SUPPORT */
let startX = 0;

document.addEventListener("touchstart", e => {
    startX = e.touches[0].clientX;
});

document.addEventListener("touchend", e => {
    let endX = e.changedTouches[0].clientX;

    if (startX - endX > 50) nextSlide();
    if (endX - startX > 50) prevSlide();
});

loadVolunteer();

</script>

</body>
</html>
